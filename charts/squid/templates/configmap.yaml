apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "squid.fullname" . }}
  labels:
    {{- include "squid.labels" . | nindent 4 }}
data:
  squid.conf: |
{{- if .Values.config.override }}
{{ .Values.config.override | indent 4 }}
{{- else }}
    # --- Generado por el chart de Helm ---
{{- range .Values.config.allowedCidrs }}
    acl localnet src {{ . }}
{{- end }}
    acl SSL_ports port 443
    acl Safe_ports port 80
    acl Safe_ports port 21
    acl Safe_ports port 443
    acl Safe_ports port 1025-65535

    http_access deny !Safe_ports
    http_access deny CONNECT !SSL_ports
    http_access allow localhost manager
    http_access deny manager
    http_access allow localnet
    http_access allow localhost
    http_access deny all

    http_port 3128

    cache_mem {{ .Values.config.cacheMem }}
{{- if .Values.persistence.enabled }}
    cache_dir ufs /var/cache/squid {{ .Values.persistence.cacheSizeMB }} 16 256
{{- end }}
    coredump_dir /var/cache/squid

    # Logs a stdout/stderr para que los recoja Kubernetes (kubectl logs)
    access_log stdio:/dev/stdout
    cache_log /dev/stderr

    refresh_pattern ^ftp:           1440    20%     10080
    refresh_pattern -i (/cgi-bin/|\?) 0     0%      0
    refresh_pattern .               0       20%     4320
{{- with .Values.config.extra }}

    # --- Configuración extra (values: config.extra) ---
{{ . | indent 4 }}
{{- end }}
{{- end }}
