services:
  squid:
    image: davidpenya77/squid:latest
    # Para construir desde el repo en lugar de usar la imagen publicada:
    # build: .
    container_name: squid
    ports:
      - "3128:3128"
    restart: unless-stopped
    volumes:
      # OJO: la ruta correcta dentro del contenedor es /etc/squid/squid.conf
      - ./config/squid.conf:/etc/squid/squid.conf:ro
      - squid-cache:/var/cache/squid
      - /etc/localtime:/etc/localtime:ro

volumes:
  squid-cache:
