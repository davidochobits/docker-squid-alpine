name: Build & Publish

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  schedule:
    # Rebuild semanal (lunes 04:00 UTC) para recoger parches de Alpine/Squid
    - cron: '0 4 * * 1'
  workflow_dispatch:

env:
  DOCKERHUB_IMAGE: davidpenya77/squid
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/squid
  TEST_TAG: squid:ci-test

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Lint shell scripts (shellcheck)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck start-squid.sh

  build:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write          # push a GHCR
      security-events: write   # subir resultados de Trivy a la pestaña Security
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Build local amd64 para test, escaneo y extraer la versión de Squid ---
      - name: Build test image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.TEST_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run -d --name squid-test -p 3128:3128 ${{ env.TEST_TAG }}
          sleep 10
          # El proxy debe responder (403/200, cualquier cosa menos fallo de conexión)
          curl -fsv -x http://localhost:3128 http://www.google.com -o /dev/null || \
          curl -sv -x http://localhost:3128 http://www.google.com -o /dev/null 2>&1 | grep -q 'HTTP/1.1'
          docker logs squid-test
          docker rm -f squid-test

      - name: Extract Squid version
        id: squid
        run: |
          VERSION=$(docker run --rm --entrypoint squid ${{ env.TEST_TAG }} -v \
            | head -n1 | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Squid version detected: ${VERSION}"

      # --- Escaneo de vulnerabilidades ---
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.TEST_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          # Cambia a '1' si quieres que el build falle con CVEs críticos
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      # --- Publicación multi-arch (solo si NO es una PR) ---
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.squid.outputs.version }},enable={{is_default_branch}}
            type=schedule,pattern=${{ steps.squid.outputs.version }}-{{date 'YYYYMMDD'}}
            type=ref,event=tag
          labels: |
            org.opencontainers.image.title=squid-alpine
            org.opencontainers.image.description=Squid proxy on Alpine Linux
            org.opencontainers.image.version=${{ steps.squid.outputs.version }}

      - name: Build & push multi-arch
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
